version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: goblog-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: db
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blogx_network

volumes:
  postgres_data:

networks:
  blogx_network:
    driver: bridge
